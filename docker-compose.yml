services:
  postgres:
    image: postgres:16
    container_name: hue-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_METASTORE_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_METASTORE_DB}"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  mysql:
    image: mysql:8.0
    container_name: hue-mysql
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DB}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: ${TZ}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u${MYSQL_USER} -p${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  impala-warehouse-init:
    image: alpine:3.20
    container_name: impala-warehouse-init
    command: ["sh", "-lc", "mkdir -p /warehouse/managed /warehouse/external && chmod -R 0777 /warehouse"]
    volumes:
      - impala_warehouse:/warehouse

  impala-hms:
    image: apache/impala:${IMPALA_VERSION}-impala_quickstart_hms
    container_name: quickstart-hive-metastore
    hostname: quickstart-hive-metastore
    restart: unless-stopped
    depends_on:
      impala-warehouse-init:
        condition: service_completed_successfully
    command: ["hms"]
    volumes:
      - impala_hms_data:/var/lib/hive
      - impala_warehouse:/user/hive/warehouse
      - ./impala/quickstart_conf:/opt/hive/conf:ro
    healthcheck:
      test: ["CMD-SHELL", "bash -lc '</dev/tcp/127.0.0.1/9083'"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 40s

  impala-statestored:
    image: apache/impala:${IMPALA_VERSION}-statestored
    container_name: statestored
    hostname: statestored
    restart: unless-stopped
    command: ["-redirect_stdout_stderr=false", "-logtostderr", "-v=1"]
    ports:
      - "25010:25010"
    volumes:
      - ./impala/quickstart_conf:/opt/impala/conf:ro
    healthcheck:
      test: ["CMD-SHELL", "bash -lc '</dev/tcp/127.0.0.1/25010'"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s

  impala-catalogd:
    image: apache/impala:${IMPALA_VERSION}-catalogd
    container_name: catalogd
    hostname: catalogd
    restart: unless-stopped
    depends_on:
      impala-warehouse-init:
        condition: service_completed_successfully
      impala-hms:
        condition: service_healthy
      impala-statestored:
        condition: service_healthy
    command:
      [
        "-redirect_stdout_stderr=false",
        "-logtostderr",
        "-v=1",
        "-hms_event_polling_interval_s=1",
        "-invalidate_tables_timeout_s=999999"
      ]
    ports:
      - "25020:25020"
    volumes:
      - impala_warehouse:/user/hive/warehouse
      - ./impala/quickstart_conf:/opt/impala/conf:ro
    healthcheck:
      test: ["CMD-SHELL", "bash -lc '</dev/tcp/127.0.0.1/25020'"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 40s

  impala:
    image: apache/impala:${IMPALA_VERSION}-impalad_coord_exec
    container_name: impala
    restart: unless-stopped
    depends_on:
      impala-warehouse-init:
        condition: service_completed_successfully
      impala-statestored:
        condition: service_healthy
      impala-catalogd:
        condition: service_healthy
    command:
      [
        "-v=1",
        "-redirect_stdout_stderr=false",
        "-logtostderr",
        "-mt_dop_auto_fallback=true",
        "-default_query_options=mt_dop=4,default_file_format=parquet,default_transactional_type=insert_only",
        "-mem_limit=4gb"
      ]
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx1g"
    ports:
      - "21000:21000"
      - "21050:21050"
      - "25000:25000"
      - "28000:28000"
    volumes:
      - impala_warehouse:/user/hive/warehouse
      - ./impala/quickstart_conf:/opt/impala/conf:ro
    healthcheck:
      test: ["CMD-SHELL", "bash -lc '</dev/tcp/127.0.0.1/21050'"]
      interval: 15s
      timeout: 5s
      retries: 30
      start_period: 60s

  impala-client:
    image: apache/impala:${IMPALA_VERSION}-impala_quickstart_client
    container_name: impala-client
    profiles: ["tools"]
    depends_on:
      impala:
        condition: service_healthy
    entrypoint: ["sleep", "infinity"]

  hue:
    build:
      context: ./hue
      dockerfile: Dockerfile
    container_name: hue
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mysql:
        condition: service_healthy
      impala:
        condition: service_healthy
    environment:
      TZ: ${TZ}
      HUE_DB_HOST: postgres
      HUE_DB_PORT: 5432
      HUE_ADMIN_USER: ${HUE_ADMIN_USER}
      HUE_ADMIN_PASSWORD: ${HUE_ADMIN_PASSWORD}
      HUE_ADMIN_EMAIL: ${HUE_ADMIN_EMAIL}
      IMPALA_HOST: impala
      IMPALA_PORT: 21050
    ports:
      - "8888:8888"
    volumes:
      - ./hue/hue.ini:/usr/share/hue/desktop/conf/z-hue.ini:ro
      - hue_logs:/usr/share/hue/logs
    healthcheck:
      test: ["CMD-SHELL", "/usr/share/hue/build/env/bin/python -c \"import socket; s=socket.socket(); s.settimeout(3); s.connect(('127.0.0.1', 8888)); s.close()\""]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s

volumes:
  postgres_data:
  mysql_data:
  hue_logs:
  impala_hms_data:
  impala_warehouse:

networks:
  default:
    name: huequickstart
