[desktop]
secret_key=change-this-key-in-real-env
http_host=0.0.0.0
http_port=8888
time_zone=America/Sao_Paulo
django_debug_mode=true
http_500_debug_mode=true
app_blacklist=jobbrowser,hive

[[database]]
engine=postgresql_psycopg2
host=postgres
port=5432
user=hue
password=hue
name=hue_metastore

[notebook]
[[interpreters]]

[[[mysql]]]
name=MySQL Local
interface=sqlalchemy
options='{"url": "mysql+pymysql://hue:hue@mysql:3306/hue_source"}'

[[[postgresql]]]
name=PostgreSQL Local
interface=sqlalchemy
options='{"url": "postgresql+psycopg2://hue:hue@postgres:5432/hue_source"}'

[[[hive]]]
name=Hive
interface=hiveserver2
is_enabled=false

[[[impala]]]
name=Impala
interface=hiveserver2
is_enabled=true

[beeswax]
hive_server_host=impala
hive_server_port=21050
use_get_log_api=true

[impala]
server_host=impala
server_port=21050
querycache_rows=50000
